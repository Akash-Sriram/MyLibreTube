version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/LibreTube"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "org.jetbrains.kotlin.*"
      - dependency-name: "com.google.devtools.ksp"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
