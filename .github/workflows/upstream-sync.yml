name: Upstream Sync

on:
  schedule:
    - cron: '0 2 * * *' # Run every day at 02:00 UTC
  workflow_dispatch: # Allow manual triggering

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git remote add upstream https://github.com/libre-tube/LibreTube.git
          git fetch upstream master
          
          # Try to merge upstream/master into the checked out master branch
          if git merge upstream/master --no-edit; then
            echo "Successfully merged upstream changes"
            # Push changes if there is something to push
            git push origin master
          else
            echo "Merge conflict detected! Please resolve manually."
            git merge --abort
            exit 1
          fi
