name: Custom Nightly Build & Release
run-name: Custom Nightly Build & Release Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-and-release:
    name: Build, Sign, and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Release Tag
        run: |
          echo "RELEASE_TAG=nightly-$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: Sync NewPipeExtractor to Upstream Dev Commit
        run: |
          LATEST_NPE_COMMIT=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/TeamNewPipe/NewPipeExtractor/commits/dev" | jq -r '.sha' | cut -c1-9)
          if [ "$LATEST_NPE_COMMIT" != "null" ] && [ ! -z "$LATEST_NPE_COMMIT" ]; then
            echo "Syncing NewPipeExtractor to latest dev commit: $LATEST_NPE_COMMIT"
            sed -i "s/newpipeextractor = \"[^\"]*\"/newpipeextractor = \"$LATEST_NPE_COMMIT\"/g" LibreTube/gradle/libs.versions.toml
          else
            echo "Failed to fetch latest commit from GitHub API, keeping pinned version"
          fi

      - name: Strip Debug Suffix & Inject Custom Version
        run: |
          # Remove debug configurations to match release builds
          sed -i 's/applicationIdSuffix = ".debug"//g' LibreTube/app/build.gradle.kts
          sed -i 's/resValue("string", "app_name", "LibreTube Debug")/resValue("string", "app_name", "LibreTube")/g' LibreTube/app/build.gradle.kts
          # Inject current release tag as versionName
          sed -i "s/versionName = .*/versionName = \"$RELEASE_TAG\"/g" LibreTube/app/build.gradle.kts

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: "temurin"
          cache: "gradle"

      - name: Compile Release APK
        run: |
          cd LibreTube
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        uses: ilharp/sign-android-release@v2
        id: sign
        with:
          signingKey: ${{ secrets.ANDROID_RELEASE_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Rename APK
        run: |
          mv "${{ steps.sign.outputs.signedFile }}" "app-release.apk"

      - name: Generate Changelog
        run: |
          echo "🚀 Custom Nightly Release - ${{ env.RELEASE_TAG }}" > changelog.txt
          echo "Built with 100% original upstream logic." >> changelog.txt
          echo "" >> changelog.txt
          echo "📋 Recent Commits:" >> changelog.txt
          git log -n 10 --no-merges --format="• [%h] %s" >> changelog.txt

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "MyLibreTube Nightly - ${{ env.RELEASE_TAG }}"
          body_path: changelog.txt
          make_latest: true
          files: "app-release.apk"
          fail_on_unmatched_files: true

      - name: Prune Old Releases and Action Runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching releases..."
          releases_to_delete=$(gh release list --json tagName -q '.[].tagName' --limit 100 | grep "^nightly-" | tail -n +3)
          for release in $releases_to_delete; do
            echo "Deleting old release: $release"
            gh release delete "$release" --yes --cleanup-tag
          done

          echo "Fetching action runs..."
          runs_to_delete=$(gh run list --workflow build-release.yml --json databaseId -q '.[].databaseId' --limit 100 | tail -n +5)
          for run_id in $runs_to_delete; do
            echo "Deleting old action run: $run_id"
            gh run delete "$run_id"
          done
