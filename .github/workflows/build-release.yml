name: Custom Nightly Build & Release
run-name: Custom Nightly Build & Release Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-and-release:
    name: Build, Sign, and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Release Tag
        run: |
          echo "RELEASE_TAG=nightly-$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: Sync NewPipeExtractor to Upstream Dev Commit
        run: |
          LATEST_NPE_COMMIT=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/TeamNewPipe/NewPipeExtractor/commits/dev" | jq -r '.sha' | cut -c1-9)
          if [ "$LATEST_NPE_COMMIT" != "null" ] && [ ! -z "$LATEST_NPE_COMMIT" ]; then
            echo "Syncing NewPipeExtractor to latest dev commit: $LATEST_NPE_COMMIT"
            sed -i "s/newpipeextractor = \"[^\"]*\"/newpipeextractor = \"$LATEST_NPE_COMMIT\"/g" gradle/libs.versions.toml
          else
            echo "Failed to fetch latest commit from GitHub API, keeping pinned version"
          fi

      - name: Strip Debug Suffix & Inject Custom Version
        run: |
          # Remove debug configurations to match release builds
          sed -i 's/applicationIdSuffix = ".debug"//g' app/build.gradle.kts
          sed -i 's/resValue("string", "app_name", "LibreTube Debug")/resValue("string", "app_name", "LibreTube")/g' app/build.gradle.kts
          # Inject current release tag as versionName
          sed -i "s/versionName = .*/versionName = \"$RELEASE_TAG\"/g" app/build.gradle.kts

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: "temurin"
          cache: "gradle"

      - name: Compile Release APK
        run: |
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        uses: ilharp/sign-android-release@v2
        id: sign
        with:
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Rename APK
        run: |
          mv "${{ steps.sign.outputs.signedFile }}" "LibreTube-release.apk"

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "LibreTube Nightly - ${{ env.RELEASE_TAG }}"
          body: "Official release build of LibreTube compiled directly from upstream logic."
          make_latest: true
          files: "LibreTube-release.apk"
          fail_on_unmatched_files: true

      - name: Prune Old Releases and Action Runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Pruning nightly releases (keep 2) ==="
          gh release list --json tagName -q '.[].tagName' --limit 100 \
            | grep "^nightly-" | tail -n +3 \
            | xargs -I{} gh release delete "{}" --yes --cleanup-tag || true

          echo "=== Pruning build-release.yml runs (keep 3) ==="
          gh run list --workflow build-release.yml --json databaseId -q '.[].databaseId' --limit 100 \
            | tail -n +4 \
            | xargs -I{} gh run delete "{}" || true

          echo "=== Pruning dependabot-auto-merge.yml runs (keep 0) ==="
          gh run list --workflow dependabot-auto-merge.yml --json databaseId -q '.[].databaseId' --limit 100 \
            | xargs -I{} gh run delete "{}" || true

          echo "=== Pruning Dependabot Updates runs (keep 0) ==="
          gh run list --workflow dependabot.yml --json databaseId -q '.[].databaseId' --limit 100 \
            | xargs -I{} gh run delete "{}" || true

  cleanup:
    name: Purge ALL Old Runs Across All Workflows
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      actions: write
    steps:
      - name: Nuke All Old Runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          echo "=== Nuking ALL dependabot-auto-merge runs ==="
          gh run list --workflow dependabot-auto-merge.yml --json databaseId -q '.[].databaseId' --limit 200 \
            | xargs -I{} gh run delete "{}" || true

          echo "=== Nuking ALL dependabot update runs ==="
          gh run list --workflow dependabot.yml --json databaseId -q '.[].databaseId' --limit 200 \
            | xargs -I{} gh run delete "{}" || true

          echo "=== Pruning build-release runs (keep 3) ==="
          gh run list --workflow build-release.yml --json databaseId -q '.[].databaseId' --limit 200 \
            | tail -n +4 \
            | xargs -I{} gh run delete "{}" || true

          echo "=== Done. All old runs deleted. ==="
