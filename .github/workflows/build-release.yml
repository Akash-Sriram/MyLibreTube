name: Custom Nightly Build & Release
run-name: Custom Nightly Build & Release Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-and-release:
    name: Build, Sign, and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Tag
        run: |
          echo "RELEASE_TAG=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: Strip Debug Suffix
        run: |
          sed -i 's/applicationIdSuffix = ".debug"//g' app/build.gradle.kts
          sed -i 's/resValue("string", "app_name", "LibreTube Debug")/resValue("string", "app_name", "LibreTube")/g' app/build.gradle.kts

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: "temurin"
          cache: "gradle"

      - name: Compile Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        uses: ilharp/sign-android-release@v2
        id: sign
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Rename APK
        run: |
          mv "${{ steps.sign.outputs.signedFile }}" "MyLibreTube-${{ env.RELEASE_TAG }}.apk"

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "MyLibreTube ${{ env.RELEASE_TAG }}"
          body: "Automated nightly release built from master branch."
          make_latest: true
          files: "MyLibreTube-${{ env.RELEASE_TAG }}.apk"
          fail_on_unmatched_files: true

      - name: Prune Old Releases (keep 3)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName -q '.[].tagName' --limit 100 \
            | tail -n +4 \
            | xargs -I{} gh release delete "{}" --yes --cleanup-tag || true

      - name: Prune Old Build Runs (keep 3)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run list --workflow build-release.yml --json databaseId -q '.[].databaseId' --limit 100 \
            | tail -n +4 \
            | xargs -I{} gh run delete "{}" || true
