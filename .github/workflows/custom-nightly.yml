name: Custom Nightly Pipeline

on:
  workflow_dispatch: # Allow manual triggers
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours automatically to check for upstream updates

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create GitHub Releases

    steps:
      - name: Checkout Repository & Submodule
        uses: actions/checkout@v4
        with:
          submodules: recursive # This pulls the LibreTube official code
          fetch-depth: 0

      - name: Apply Custom Patches
        run: |
          sudo apt-get update && sudo apt-get install -y dos2unix
          cd LibreTube
          # Apply all patches from our patches directory directly onto the official codebase
          for patch in ../patches/*.patch; do
            dos2unix "$patch"
            git apply --ignore-whitespace "$patch"
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"
          cache: "gradle"

      - name: Compile Modified LibreTube
        run: |
          cd LibreTube
          ./gradlew assembleDebug

      - name: Sign APK manually
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          cd LibreTube/app/build/outputs/apk/debug
          APK=$(find . -name "*.apk" | head -n 1)
          $ANDROID_HOME/build-tools/34.0.0/zipalign -p -f -v 4 "$APK" aligned.apk
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks ../../../../../../keystore.jks --ks-key-alias "$KEY_ALIAS" --ks-pass "pass:$KEYSTORE_PASSWORD" --key-pass "pass:$KEY_PASSWORD" aligned.apk
          mv aligned.apk "$APK"

      - name: Generate Release Tag
        run: |
          echo "RELEASE_TAG=nightly-$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Latest Nightly Build (${{ env.RELEASE_TAG }})"
          body: "Automated custom nightly build synced from upstream."
          make_latest: true
          files: LibreTube/app/build/outputs/apk/debug/*.apk
