name: Custom Nightly Pipeline

on:
  workflow_dispatch: # Allow manual triggers
  push:
    branches: [ master ] # Instantly triggers when Dependabot merges new code!
  schedule:
    - cron: '0 0 * * *' # Runs automatically daily at midnight UTC

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create GitHub Releases
      actions: write  # Needed to delete old workflow runs

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Changelog
        run: |
          echo "🚀 MyLibreTube Nightly Release" > changelog.txt
          echo "Built from the latest codebase." >> changelog.txt
          echo "" >> changelog.txt
          echo "📋 Recent Changes:" >> changelog.txt
          git log -n 10 --no-merges --format="• [%h] %s" >> changelog.txt

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: "temurin"
          cache: "gradle"

      - name: Generate Release Tag
        run: |
          echo "RELEASE_TAG=nightly-$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: Sync NewPipeExtractor to Upstream Dev Commit
        run: |
          LATEST_NPE_COMMIT=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/TeamNewPipe/NewPipeExtractor/commits/dev" | jq -r '.sha' | cut -c1-9)
          if [ "$LATEST_NPE_COMMIT" != "null" ] && [ ! -z "$LATEST_NPE_COMMIT" ]; then
            echo "Syncing NewPipeExtractor to latest dev commit: $LATEST_NPE_COMMIT"
            sed -i "s/newpipeextractor = \"[^\"]*\"/newpipeextractor = \"$LATEST_NPE_COMMIT\"/g" LibreTube/gradle/libs.versions.toml
          else
            echo "Failed to fetch latest commit from GitHub API, keeping pinned version"
          fi

      - name: Strip Debug Suffix & Inject Version
        run: |
          sed -i "s/applicationIdSuffix = \".debug\"//g" LibreTube/app/build.gradle.kts
          sed -i "s/resValue(\"string\", \"app_name\", \"LibreTube Debug\")/resValue(\"string\", \"app_name\", \"LibreTube\")/g" LibreTube/app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"$RELEASE_TAG\"/g" LibreTube/app/build.gradle.kts

      - name: Compile Modified LibreTube
        run: |
          cd LibreTube
          ./gradlew assembleDebug

      - name: Sign APK manually
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          cd LibreTube/app/build/outputs/apk/debug
          APK=$(find . -name "*.apk" | head -n 1)
          $ANDROID_HOME/build-tools/34.0.0/zipalign -p -f -v 4 "$APK" aligned.apk
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks ../../../../../../keystore.jks --ks-key-alias "$KEY_ALIAS" --ks-pass "pass:$KEYSTORE_PASSWORD" --key-pass "pass:$KEY_PASSWORD" aligned.apk
          mv aligned.apk "$APK"

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "MyLibreTube Nightly - ${{ env.RELEASE_TAG }}"
          body_path: changelog.txt
          make_latest: true
          files: LibreTube/app/build/outputs/apk/debug/*.apk

      - name: Prune Old Releases and Action Runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching releases..."
          releases_to_delete=$(gh release list --json tagName -q '.[].tagName' --limit 100 | grep "^nightly-" | tail -n +4)
          for release in $releases_to_delete; do
            echo "Deleting old release: $release"
            gh release delete "$release" --yes --cleanup-tag
          done

          echo "Fetching action runs..."
          runs_to_delete=$(gh run list --workflow custom-nightly.yml --json databaseId -q '.[].databaseId' --limit 100 | tail -n +6)
          for run_id in $runs_to_delete; do
            echo "Deleting old action run: $run_id"
            gh run delete "$run_id"
          done
