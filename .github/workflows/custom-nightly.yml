name: Custom Nightly Pipeline

on:
  workflow_dispatch: # Allow manual triggers
  schedule:
    - cron: "0 * * * *" # Runs every 1 hour

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create GitHub Releases

    steps:
      - name: Checkout Repository & Submodule
        uses: actions/checkout@v4
        with:
          submodules: recursive # This pulls the LibreTube official code
          fetch-depth: 0

      - name: Check for Upstream Updates
        id: check_updates
        run: |
          # Get old commit
          OLD_COMMIT=$(git submodule status LibreTube | awk '{print $1}' | sed 's/^+//' | sed 's/^-//')
          
          git submodule update --remote --recursive
          
          if git diff --quiet LibreTube; then
            echo "updated=false" >> $GITHUB_OUTPUT
            echo "No upstream changes." > changelog.txt
          else
            echo "updated=true" >> $GITHUB_OUTPUT
            NEW_COMMIT=$(git submodule status LibreTube | awk '{print $1}' | sed 's/^+//' | sed 's/^-//')
            
            # Generate Changelog
            cd LibreTube
            CHANGELOG=$(git log ${OLD_COMMIT}..${NEW_COMMIT} --oneline)
            cd ..
            
            echo "## Upstream Changes" > changelog.txt
            echo '```text' >> changelog.txt
            echo "$CHANGELOG" >> changelog.txt
            echo '```' >> changelog.txt
            
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "Sync submodule with upstream LibreTube" || true
            git push || true
          fi

      - name: Apply Custom Patches
        if: steps.check_updates.outputs.updated == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          sudo apt-get update && sudo apt-get install -y dos2unix
          cd LibreTube
          # Apply all patches from our patches directory directly onto the official codebase
          for patch in ../patches/*.patch; do
            dos2unix "$patch"
            git apply --ignore-whitespace "$patch"
          done

      - name: Set up JDK 17
        if: steps.check_updates.outputs.updated == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"
          cache: "gradle"

      - name: Generate Release Tag
        if: steps.check_updates.outputs.updated == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          echo "RELEASE_TAG=nightly-$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: Strip Debug Suffix & Inject Version
        if: steps.check_updates.outputs.updated == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          sed -i "s/applicationIdSuffix = \".debug\"//g" LibreTube/app/build.gradle.kts
          sed -i "s/resValue(\"string\", \"app_name\", \"LibreTube Debug\")/resValue(\"string\", \"app_name\", \"LibreTube\")/g" LibreTube/app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"$RELEASE_TAG\"/g" LibreTube/app/build.gradle.kts
          sed -i "s/\.toInt()/\.toLong()/g" LibreTube/app/src/main/java/com/github/libretube/util/UpdateChecker.kt

      - name: Compile Modified LibreTube
        if: steps.check_updates.outputs.updated == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          cd LibreTube
          ./gradlew assembleDebug

      - name: Sign APK manually
        if: steps.check_updates.outputs.updated == 'true' || github.event_name == 'workflow_dispatch'
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          cd LibreTube/app/build/outputs/apk/debug
          APK=$(find . -name "*.apk" | head -n 1)
          $ANDROID_HOME/build-tools/34.0.0/zipalign -p -f -v 4 "$APK" aligned.apk
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks ../../../../../../keystore.jks --ks-key-alias "$KEY_ALIAS" --ks-pass "pass:$KEYSTORE_PASSWORD" --key-pass "pass:$KEY_PASSWORD" aligned.apk
          mv aligned.apk "$APK"

      - name: Publish to GitHub Releases
        if: steps.check_updates.outputs.updated == 'true' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "${{ env.RELEASE_TAG }}"
          body_path: changelog.txt
          make_latest: true
          files: LibreTube/app/build/outputs/apk/debug/*.apk
