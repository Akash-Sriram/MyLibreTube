name: Custom Nightly Pipeline

on:
  workflow_dispatch: # Allow manual triggers
  push:
    branches: [ master ] # Instantly triggers when Dependabot merges new code!
  schedule:
    - cron: '0 0 * * *' # Runs automatically daily at midnight UTC

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create GitHub Releases
      actions: write  # Needed to delete old workflow runs

    steps:
      - name: Checkout Repository & Submodule
        uses: actions/checkout@v4
        with:
          submodules: recursive # This pulls the LibreTube official code
          fetch-depth: 0

      - name: Generate Changelog
        run: |
          OLD_COMMIT=$(git ls-tree HEAD~1 LibreTube 2>/dev/null | awk '{print $3}' || echo "")
          NEW_COMMIT=$(git ls-tree HEAD LibreTube 2>/dev/null | awk '{print $3}' || echo "")
          
          echo "## Upstream Changes" > changelog.txt
          echo '```text' >> changelog.txt
          
          if [ -n "$OLD_COMMIT" ] && [ -n "$NEW_COMMIT" ] && [ "$OLD_COMMIT" != "$NEW_COMMIT" ]; then
            cd LibreTube
            # Fetch full history so old commits are available; ignore errors if not reachable
            git fetch --unshallow 2>/dev/null || git fetch --depth=200 2>/dev/null || true
            CHANGELOG=$(git log ${OLD_COMMIT}..${NEW_COMMIT} --oneline 2>/dev/null || echo "Upstream LibreTube updated.")
            cd ..
            echo "$CHANGELOG" >> changelog.txt
          else
            echo "Manual workflow trigger or internal pipeline update." >> changelog.txt
          fi
          
          echo '```' >> changelog.txt

      - name: Inject Custom Source Files
        run: |
          BASE="LibreTube/app/src/main/java/com/github/libretube"
          
          # Direct file copy — no patches, no encoding issues, always works
          cp patches/sources/util/UpdateReceiver.kt        $BASE/util/UpdateReceiver.kt
          cp patches/sources/util/UpdateChecker.kt         $BASE/util/UpdateChecker.kt
          cp patches/sources/dialogs/UpdateAvailableDialog.kt $BASE/ui/dialogs/UpdateAvailableDialog.kt
          cp patches/sources/obj/update/UpdateInfo.kt      $BASE/obj/update/UpdateInfo.kt
          
          # Apply patches (URL 001, AndroidManifest 002, BackupHelper 004)
          sudo apt-get update && sudo apt-get install -y dos2unix
          dos2unix patches/001-updater-url.patch
          dos2unix patches/002-updater-manifest.patch
          dos2unix patches/004-backup-restore-fix.patch
          cd LibreTube
          git apply --ignore-whitespace ../patches/001-updater-url.patch
          git apply --ignore-whitespace ../patches/002-updater-manifest.patch
          git apply --ignore-whitespace ../patches/004-backup-restore-fix.patch

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"
          cache: "gradle"

      - name: Generate Release Tag
        run: |
          echo "RELEASE_TAG=nightly-$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: Strip Debug Suffix & Inject Version
        run: |
          sed -i "s/applicationIdSuffix = \".debug\"//g" LibreTube/app/build.gradle.kts
          sed -i "s/resValue(\"string\", \"app_name\", \"LibreTube Debug\")/resValue(\"string\", \"app_name\", \"LibreTube\")/g" LibreTube/app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"$RELEASE_TAG\"/g" LibreTube/app/build.gradle.kts

      - name: Compile Modified LibreTube
        run: |
          cd LibreTube
          ./gradlew assembleDebug

      - name: Sign APK manually
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          cd LibreTube/app/build/outputs/apk/debug
          APK=$(find . -name "*.apk" | head -n 1)
          $ANDROID_HOME/build-tools/34.0.0/zipalign -p -f -v 4 "$APK" aligned.apk
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks ../../../../../../keystore.jks --ks-key-alias "$KEY_ALIAS" --ks-pass "pass:$KEYSTORE_PASSWORD" --key-pass "pass:$KEY_PASSWORD" aligned.apk
          mv aligned.apk "$APK"

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "${{ env.RELEASE_TAG }}"
          body_path: changelog.txt
          make_latest: true
          files: LibreTube/app/build/outputs/apk/debug/*.apk

      - name: Prune Old Releases and Action Runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching releases..."
          releases_to_delete=$(gh release list --json tagName -q '.[].tagName' --limit 100 | grep "^nightly-" | tail -n +4)
          for release in $releases_to_delete; do
            echo "Deleting old release: $release"
            gh release delete "$release" --yes --cleanup-tag
          done

          echo "Fetching action runs..."
          runs_to_delete=$(gh run list --workflow custom-nightly.yml --json databaseId -q '.[].databaseId' --limit 100 | tail -n +6)
          for run_id in $runs_to_delete; do
            echo "Deleting old action run: $run_id"
            gh run delete "$run_id"
          done
